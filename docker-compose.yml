name: site-informatif-iran

services:
  db:
    image: postgres:17.5
    container_name: site-informatif-iran-db
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./base.sql:/docker-entrypoint-initdb.d/01-base.sql:ro
      - ./seed_guerre_iran_2026.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-seed:
    image: postgres:17.5
    container_name: site-informatif-iran-db-seed
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: app_password
    volumes:
      - ./base.sql:/sql/01-base.sql:ro
      - ./seed_guerre_iran_2026.sql:/sql/02-seed.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h db -U app_user -d app_db -f /sql/01-base.sql
        psql -h db -U app_user -d app_db -f /sql/02-seed.sql
    restart: "no"

  frontoffice:
    build:
      context: .
      dockerfile: Dockerfile.frontoffice
    container_name: site-informatif-iran-frontoffice
    environment:
      APP_BASE_URL_BACKOFFICE_INTERNAL: http://backoffice
    ports:
      - "8080:80"
    volumes:
      - ./Frontoffice:/var/www/html
    depends_on:
      db-seed:
        condition: service_completed_successfully

  backoffice:
    build:
      context: .
      dockerfile: Dockerfile.backoffice
    container_name: site-informatif-iran-backoffice
    environment:
      TINYMCE_API_KEY: ${TINYMCE_API_KEY:-no-api-key}
    ports:
      - "8081:80"
    volumes:
      - ./Backoffice:/var/www/html
    depends_on:
      db-seed:
        condition: service_completed_successfully

volumes:
  postgres_data: